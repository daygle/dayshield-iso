; ISOLINUX/SYSLINUX configuration for legacy BIOS fallback
; (used only when GRUB BIOS boot is unavailable)

DEFAULT install
PROMPT 0
TIMEOUT 50
TOTALTIMEOUT 300

LABEL install
    MENU LABEL Install DayShield Firewall OS
    KERNEL /boot/vmlinuz
    APPEND initrd=/boot/initrd.img \
           root=live:CDLABEL=DAYSHIELD \
           boot=live \
           components \
           live-media-path=/live \
           rd.live.image \
           rd.live.dir=/live \
           rd.live.squashimg=filesystem.squashfs \
           ipv6.disable=1 \
           installer

LABEL serial
    MENU LABEL Install DayShield (serial console)
    KERNEL /boot/vmlinuz
    APPEND initrd=/boot/initrd.img \
           root=live:CDLABEL=DAYSHIELD \
           boot=live \
           components \
           live-media-path=/live \
           rd.live.image \
           rd.live.dir=/live \
           rd.live.squashimg=filesystem.squashfs \
           ipv6.disable=1 \
           installer \
           console=ttyS0,115200n8

LABEL localboot
    MENU LABEL Boot from local disk
    LOCALBOOT 0x80
