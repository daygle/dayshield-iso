# DayShield Firewall OS - GRUB bootloader configuration
# Supports both BIOS (via El Torito) and UEFI boot.

set default=0
set timeout=5

insmod all_video
insmod gfxterm
insmod png
insmod font

# Load a unicode-capable GRUB font if available, then try graphical output.
if [ -f /boot/grub/unicode.pf2 ]; then
    loadfont /boot/grub/unicode.pf2
fi
terminal_output gfxterm || terminal_output console

# Enable graphical terminal only when gfxterm initialises successfully.
# On headless and serial-console machines the command returns non-zero and
# the block is skipped, leaving GRUB in its default text terminal.
if terminal_output gfxterm; then
    if [ -f /boot/grub/splash.png ]; then
        background_image /boot/grub/splash.png
    fi
fi

menuentry "Install DayShield Firewall OS" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660
    insmod ext2

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               quiet \
               loglevel=4 \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               ipv6.disable=1 \
               fsck.mode=skip \
               live-config.components=hostname \
               installer \
               console=tty0
# NOTE: boot=live / live-media-path / components are honored by mkinitramfs+live-boot
#       (the default initrd path).  rd.live.* params are honored by a dracut
#       dmsquash-live initrd (USE_DRACUT=1).  Both sets are present so that either
#       initrd type can boot without updating this file.
# NOTE: live-config.components=hostname restricts live-config to only the hostname
#       script; this prevents user-setup, autologin, display-manager config and other
#       components from running and failing on a server/firewall rootfs that has no
#       standard "user"/"live" account — the most likely source of a transient error
#       flash during live boot.
# NOTE: fsck.mode=skip suppresses systemd-fsck probing the squashfs root, another
#       common source of brief error output during live boot.

    initrd /boot/initrd.img
}

