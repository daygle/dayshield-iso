# DayShield Firewall OS - GRUB bootloader configuration
# Supports both BIOS (via El Torito) and UEFI boot.

set default=0
set timeout=5

insmod all_video
insmod gfxterm
insmod png

if [ -f /boot/grub/splash.png ]; then
    background_image /boot/grub/splash.png
fi

terminal_output gfxterm

menuentry "Install DayShield Firewall OS" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660
    insmod ext2

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               ipv6.disable=1 \
               installer \
               console=tty0

    initrd /boot/initrd.img
}

menuentry "Install DayShield (serial console)" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               ipv6.disable=1 \
