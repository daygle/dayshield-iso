# DayShield Firewall OS — GRUB bootloader configuration
# Supports both BIOS (via El Torito) and UEFI boot.

set default=0
set timeout=5

# Load graphics modules for a splash screen
insmod all_video
insmod gfxterm
insmod png

# Try to show splash
if [ -f /boot/grub/splash.png ]; then
    background_image /boot/grub/splash.png
fi

terminal_output gfxterm

# ---------------------------------------------------------------------------
# Menu entries
# ---------------------------------------------------------------------------

menuentry "Install DayShield Firewall OS" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660
    insmod ext2

    # The ISO is identified by volume label DAYSHIELD
    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /live/vmlinuz \
               boot=live \
               live-media-path=/live \
               quiet \
               splash \
               ipv6.disable=1 \
               rd.live.image \
               rd.live.squashimg=filesystem.squashfs \
               installer \
               console=ttyS0,115200n8 \
               console=tty0
    initrd /live/initrd.img
}

menuentry "Install DayShield (serial console)" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /live/vmlinuz \
               boot=live \
               live-media-path=/live \
               ipv6.disable=1 \
               rd.live.image \
               rd.live.squashimg=filesystem.squashfs \
               installer \
               console=ttyS0,115200n8
    initrd /live/initrd.img
}

menuentry "Boot from local disk" --class localboot {
    insmod chain
    chainloader +1
}
