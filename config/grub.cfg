# DayShield Firewall OS - GRUB bootloader configuration
# Supports both BIOS (via El Torito) and UEFI boot.

set default=0
set timeout=5

insmod all_video
insmod gfxterm
insmod png
insmod font

# Load a unicode-capable GRUB font if available, then try graphical output.
if [ -f /boot/grub/unicode.pf2 ]; then
    loadfont /boot/grub/unicode.pf2
fi
terminal_output gfxterm || terminal_output console

# Try to load splash when gfxterm is active; ignore errors on text/serial-only
# systems where background images are unsupported.
if [ -f /boot/grub/splash.png ]; then
    background_image /boot/grub/splash.png || true
fi

menuentry "Install DayShield Firewall" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660
    insmod ext2

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               quiet \
               loglevel=4 \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               fsck.mode=skip \
               live-config.components=hostname \
               installer \
               console=tty0
# NOTE: boot=live / live-media-path / components are honored by mkinitramfs+live-boot
#       (the default initrd path).  rd.live.* params are honored by a dracut
#       dmsquash-live initrd (USE_DRACUT=1).  Both sets are present so that either
#       initrd type can boot without updating this file.
# NOTE: live-config.components=hostname restricts live-config to only the hostname
#       script; this prevents user-setup, autologin, display-manager config and other
#       components from running and failing on a server/firewall rootfs that has no
#       standard "user"/"live" account - the most likely source of a transient error
#       flash during live boot.
# NOTE: fsck.mode=skip suppresses systemd-fsck probing the squashfs root, another
#       common source of brief error output during live boot.

    initrd /boot/initrd.img
}

menuentry "Install DayShield Firewall (Serial Console)" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               fsck.mode=skip \
               live-config.components=hostname \
               installer \
               console=ttyS0,115200n8

    initrd /boot/initrd.img
}

menuentry "Install DayShield Firewall (Safe Mode Debug)" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               nomodeset \
               loglevel=7 \
               ignore_loglevel \
               rd.debug \
               rd.udev.log_level=debug \
               rd.systemd.show_status=1 \
               systemd.log_level=debug \
               systemd.log_target=console \
               systemd.show_status=1 \
               fsck.mode=skip \
               live-config.components=hostname \
               installer \
               console=tty0

    initrd /boot/initrd.img
}

if [ "$grub_platform" = "efi" ]; then
menuentry "Boot from local disk (UEFI firmware)" {
    # Return to firmware boot manager; firmware then boots the next configured
    # entry (typically the installed OS on disk).
    exit
}
else
menuentry "Boot from local disk (BIOS)" {
    insmod chain
    set root=(hd0)
    chainloader +1
    boot
}

menuentry "Boot from local disk (BIOS, alternate disk)" {
    insmod chain
    set root=(hd1)
    chainloader +1
    boot
}
fi
