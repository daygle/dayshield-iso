menuentry "Install DayShield (safe mode debug)" --class dayshield {
    insmod gzio
    insmod part_gpt
    insmod part_msdos
    insmod iso9660

    search --no-floppy --set=root --label "DAYSHIELD"

    linux  /boot/vmlinuz \
               root=live:CDLABEL=DAYSHIELD \
               boot=live \
               components \
               live-media-path=/live \
               rd.live.image \
               rd.live.dir=/live \
               rd.live.squashimg=filesystem.squashfs \
               nowatchdog \
               modprobe.blacklist=iTCO_wdt,iTCO_vendor_support \
               nomodeset \
               loglevel=7 \
               ignore_loglevel \
               rd.debug \
               rd.udev.log_level=debug \
               rd.systemd.show_status=1 \
               systemd.log_level=debug \
               systemd.log_target=console \
               systemd.show_status=1 \
               ipv6.disable=1 \
               installer \
               console=tty0

    initrd /boot/initrd.img
}

menuentry "Boot from local disk" {
    insmod chain
    set root=(hd0)   # redirect to first hard disk, not the CD (which is the current root)
    chainloader +1
}
