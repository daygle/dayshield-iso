name: Build & Release

on:
  push:
    tags:
      - 'iso-v*'
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: |
          ISO release tag (e.g. iso-v1.0.3).
        required: true
        type: string
      rootfs_repo:
        description: |
          Rootfs repo containing the release artifact.
        required: false
        default: daygle/dayshield-rootfs
        type: string
      rootfs_ref:
        description: |
          Rootfs Release Tag (e.g. v1.0.0). Leave empty to auto-resolve latest stable.
        required: false
        default: ""
        type: string
      installer_ui_ref:
        description: |
          Installer UI Release Tag (e.g. v1.0.0). Leave empty to auto-resolve latest stable.
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [build-iso-from-release]

concurrency:
  group: build-iso-${{ github.ref_name || github.event.inputs.tag || github.event.client_payload.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-release:
    if: >-
      github.event_name != 'create' ||
      (github.event.ref_type == 'tag' &&
      (startsWith(github.event.ref, 'iso-v') || startsWith(github.event.ref, 'v')))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout ISO repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Resolve build inputs
        # For tag-push builds the rootfs ref and other inputs are read from
        # release-inputs.env (committed to this repo).  workflow_dispatch and
        # repository_dispatch callers supply the inputs directly.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: derive the release tag from the git ref.
            RELEASE_TAG="${{ github.ref_name }}"

            # Read optional pinned build inputs from release-inputs.env.
            if [ -f release-inputs.env ]; then
              # shellcheck source=release-inputs.env
              source release-inputs.env
            else
              echo "WARNING: release-inputs.env not found; using automatic defaults."
            fi

            ROOTFS_REPO="${ROOTFS_REPO:-daygle/dayshield-rootfs}"
            INSTALLER_UI_REF_REQUESTED="${INSTALLER_UI_REF:-}"
          elif [ "${{ github.event_name }}" = "create" ]; then
            # Tag create (for tags created in GitHub UI/API): derive tag from create payload.
            RELEASE_TAG="${{ github.event.ref }}"

            # Read optional pinned build inputs from release-inputs.env.
            if [ -f release-inputs.env ]; then
              # shellcheck source=release-inputs.env
              source release-inputs.env
            else
              echo "WARNING: release-inputs.env not found; using automatic defaults."
            fi

            ROOTFS_REPO="${ROOTFS_REPO:-daygle/dayshield-rootfs}"
            INSTALLER_UI_REF_REQUESTED="${INSTALLER_UI_REF:-}"
          else
            # workflow_dispatch or repository_dispatch: use caller-supplied inputs.
            RELEASE_TAG="${{ github.event.inputs.tag || github.event.client_payload.tag }}"
            ROOTFS_REF="${{ github.event.inputs.rootfs_ref || github.event.client_payload.rootfs_ref }}"
            ROOTFS_REPO="${{ github.event.inputs.rootfs_repo || github.event.client_payload.rootfs_repo || 'daygle/dayshield-rootfs' }}"
            INSTALLER_UI_REF_REQUESTED="${{ github.event.inputs.installer_ui_ref || github.event.client_payload.installer_ui_ref || '' }}"
          fi

          # Auto-resolve latest rootfs release when no explicit ref is provided.
          # This uses the public GitHub REST API. A rootfs tag alone is not
          # enough here: the ISO build consumes release assets uploaded by the
          # rootfs workflow.
          resolve_latest_rootfs_release() {
            local repo="$1" api_response="" result=""
            api_response="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases?per_page=50" \
              2>/dev/null)" || api_response=""
            if [ -n "${api_response}" ]; then
              result="$(printf '%s' "${api_response}" | jq -r '[.[] | select((.draft // false | not) and (.prerelease // false | not) and (.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+([-.][0-9A-Za-z.]+)?$")))] | sort_by(.published_at // .created_at) | reverse | .[0].tag_name // empty' 2>/dev/null)" || result=""
            fi
            if [ -n "${result}" ] && [ "${result}" != "null" ]; then
              printf '%s' "${result}"
              return 0
            fi
            return 1
          }

          rootfs_release_exists() {
            local repo="$1" ref="$2"
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases/tags/${ref}" \
              >/dev/null 2>&1
          }

          print_rootfs_release_diagnostics() {
            local repo="$1" releases=""
            echo "  Published releases visible publicly:" >&2
            releases="$(curl -sSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases?per_page=10" \
              2>/dev/null)" || releases=""
            if [ -n "${releases}" ]; then
              printf '%s' "${releases}" | jq -r 'if type == "array" then (if length == 0 then "  <none>" else .[] | "  \(.tag_name) published=\(.published_at // .created_at) assets=\(.assets | length)" end) else "  " + (.message // tostring) end' >&2 || true
            else
              echo "  <unable to query releases>" >&2
            fi
            echo "  Recent matching tags (tags do not contain release assets):" >&2
            git ls-remote --tags "https://github.com/${repo}.git" 2>/dev/null \
              | awk -F/ '{print $3}' \
              | sed 's/\^{}$//' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$' \
              | sort -Vu \
              | tail -10 >&2 || true
          }

          if [ -z "${ROOTFS_REF:-}" ]; then
            echo "ROOTFS_REF not provided; resolving latest published rootfs release from ${ROOTFS_REPO}"
            ROOTFS_REF="$(resolve_latest_rootfs_release "${ROOTFS_REPO}")" || ROOTFS_REF=""
            if [ -z "${ROOTFS_REF}" ] || [ "${ROOTFS_REF}" = "null" ]; then
              echo "ERROR: unable to resolve a published release tag from ${ROOTFS_REPO}" >&2
              echo "       Create a non-draft rootfs GitHub Release, pass rootfs_ref, or pin ROOTFS_REF in release-inputs.env." >&2
              print_rootfs_release_diagnostics "${ROOTFS_REPO}"
              exit 1
            fi
            echo "  Resolved ROOTFS_REF=${ROOTFS_REF}"
          elif ! rootfs_release_exists "${ROOTFS_REPO}" "${ROOTFS_REF}"; then
            echo "ERROR: rootfs release ${ROOTFS_REPO}@${ROOTFS_REF} was not found publicly." >&2
            echo "       The ISO build needs GitHub Release assets, not just a git tag." >&2
            print_rootfs_release_diagnostics "${ROOTFS_REPO}"
            exit 1
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}"                               >> "$GITHUB_ENV"
          echo "ROOTFS_REF=${ROOTFS_REF}"                                 >> "$GITHUB_ENV"
          echo "ROOTFS_REPO=${ROOTFS_REPO}"                               >> "$GITHUB_ENV"
          echo "INSTALLER_UI_REF_REQUESTED=${INSTALLER_UI_REF_REQUESTED}" >> "$GITHUB_ENV"
          echo "ISO_NAME=dayshield-${RELEASE_TAG}.iso"                    >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          if [ -z "${ROOTFS_REF}" ]; then
            echo "Unable to determine rootfs_ref automatically and none was provided"
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^(iso-v|v)[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid ISO release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ ! "${ROOTFS_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid rootfs release tag: ${ROOTFS_REF}" >&2
            exit 1
          fi
          if [ -n "${INSTALLER_UI_REF_REQUESTED:-}" ] && [[ ! "${INSTALLER_UI_REF_REQUESTED}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Invalid installer UI release tag: ${INSTALLER_UI_REF_REQUESTED}" >&2
            exit 1
          fi
          echo "Building ISO tag:    ${RELEASE_TAG}"
          echo "Rootfs repo:         ${ROOTFS_REPO}"
          echo "Rootfs ref:          ${ROOTFS_REF}"
          echo "Installer UI ref:    ${INSTALLER_UI_REF_REQUESTED:-<auto: latest stable release>}"

      - name: Resolve installer UI ref
        id: resolve_installer_ui_ref
        run: |
          set -euo pipefail
          REPO="daygle/dayshield-installer-ui"
          CANDIDATE="${INSTALLER_UI_REF_REQUESTED}"

          resolve_latest_stable() {
            local repo="$1" response="" result=""
            response="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases?per_page=50" \
              2>/dev/null)" || response=""
            if [ -n "${response}" ]; then
              result="$(printf '%s' "${response}" | jq -r '[.[] | select((.draft // false | not) and (.prerelease // false | not))] | sort_by(.published_at // .created_at) | reverse | .[0].tag_name // empty' 2>/dev/null)" || result=""
            fi
            printf '%s' "${result}"
          }

          release_exists() {
            local repo="$1" ref="$2"
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases/tags/${ref}" \
              >/dev/null 2>&1
          }

          print_release_diagnostics() {
            local repo="$1" response=""
            response="$(curl -sSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases?per_page=10" \
              2>/dev/null)" || response=""
            if [ -n "${response}" ]; then
              printf '%s' "${response}" | jq -r 'if type == "array" then (if length == 0 then "  <none>" else .[] | "  \(.tag_name) published=\(.published_at // .created_at) assets=\(.assets | length)" end) else "  " + (.message // tostring) end' >&2 || true
            else
              echo "  <unable to query releases>" >&2
            fi
          }

          if [ -z "${CANDIDATE}" ]; then
            RESOLVED="$(resolve_latest_stable "${REPO}")"
            if [ -z "${RESOLVED}" ] || [ "${RESOLVED}" = "null" ]; then
              echo "ERROR: no stable installer UI release found in ${REPO}" >&2
              echo "Available public releases:" >&2
              print_release_diagnostics "${REPO}"
              exit 1
            fi
            echo "Auto-resolved installer UI release tag: ${RESOLVED}"
          elif release_exists "${REPO}" "${CANDIDATE}"; then
            RESOLVED="${CANDIDATE}"
            echo "Resolved installer UI release tag: ${RESOLVED}"
          else
            RESOLVED="$(resolve_latest_stable "${REPO}")"
            if [ -z "${RESOLVED}" ] || [ "${RESOLVED}" = "null" ]; then
              echo "ERROR: installer UI release '${CANDIDATE}' not found and no stable fallback exists in ${REPO}" >&2
              echo "Available public releases:" >&2
              print_release_diagnostics "${REPO}"
              exit 1
            fi
            echo "WARNING: installer UI release '${CANDIDATE}' not found; using latest stable release '${RESOLVED}'"
          fi

          echo "INSTALLER_UI_REF=${RESOLVED}" >> "$GITHUB_ENV"
          echo "installer_ui_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"
      - name: Download installer UI payload
        run: |
          set -euo pipefail
          INSTALLER_REPO="daygle/dayshield-installer-ui"
          INSTALLER_ARTIFACT="installer-ui-${INSTALLER_UI_REF}.tar.gz"
          INSTALLER_SHA256="${INSTALLER_ARTIFACT}.sha256"
          ARTIFACT_DIR="${GITHUB_WORKSPACE}/deps-artifacts/installer-ui"
          INSTALLER_DEST_DIR="deps/dayshield-installer-ui"

          download_release_asset() {
            local repo="$1" ref="$2" name="$3" dest="$4" response="" url=""
            response="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases/tags/${ref}")"
            url="$(printf '%s' "${response}" | jq -r --arg name "${name}" '.assets[] | select(.name == $name) | .browser_download_url' | head -n1)"
            if [ -z "${url}" ] || [ "${url}" = "null" ]; then
              echo "ERROR: missing release asset ${name} in ${repo}@${ref}" >&2
              printf '%s' "${response}" | jq -r '.assets[].name' >&2 || true
              exit 1
            fi
            curl -fL "${url}" -o "${dest}"
          }

          rm -rf "${ARTIFACT_DIR}" "${INSTALLER_DEST_DIR}"
          mkdir -p "${ARTIFACT_DIR}" "${INSTALLER_DEST_DIR}"

          download_release_asset "${INSTALLER_REPO}" "${INSTALLER_UI_REF}" "${INSTALLER_ARTIFACT}" "${ARTIFACT_DIR}/${INSTALLER_ARTIFACT}"
          download_release_asset "${INSTALLER_REPO}" "${INSTALLER_UI_REF}" "${INSTALLER_SHA256}" "${ARTIFACT_DIR}/${INSTALLER_SHA256}"

          (cd "${ARTIFACT_DIR}" && sha256sum -c "${INSTALLER_SHA256}")
          tar -xzf "${ARTIFACT_DIR}/${INSTALLER_ARTIFACT}" -C "${INSTALLER_DEST_DIR}"
      - name: Install ISO build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools grub-pc-bin grub-efi-amd64-bin \
            dosfstools dracut zstd parted rsync util-linux \
            mmdebstrap systemd-container

      - name: Download rootfs artifact and checksums
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Rootfs is versioned independently in its own repo.
          # ROOTFS_REF is the rootfs-specific tag (e.g. v2.1.0), which is
          # independent of the ISO tag or any other component version.
          ROOTFS_ASSET="rootfs-${ROOTFS_REF}.tar.zst"
          ROOTFS_SQUASHFS_ASSET="rootfs-${ROOTFS_REF}.squashfs"

          release_json="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ROOTFS_REPO}/releases/tags/${ROOTFS_REF}")"

          download_release_asset() {
            local name="$1" required="$2" url=""
            url="$(printf '%s' "${release_json}" | jq -r --arg name "${name}" '.assets[] | select(.name == $name) | .browser_download_url' | head -n1)"
            if [ -z "${url}" ] || [ "${url}" = "null" ]; then
              if [ "${required}" = "required" ]; then
                echo "ERROR: missing release asset ${name} in ${ROOTFS_REPO}@${ROOTFS_REF}" >&2
                echo "Available assets:" >&2
                printf '%s' "${release_json}" | jq -r '.assets[].name' >&2 || true
                exit 1
              fi
              return 1
            fi
            curl -fL "${url}" -o "artifacts/${name}"
          }

          download_release_asset "${ROOTFS_ASSET}" required
          download_release_asset "${ROOTFS_SQUASHFS_ASSET}" required
          download_release_asset "${ROOTFS_ASSET}.sha256" optional || true
          download_release_asset "${ROOTFS_SQUASHFS_ASSET}.sha256" optional || true
          download_release_asset "checksums.txt" optional || true

          if [ -f "artifacts/${ROOTFS_ASSET}.sha256" ]; then
            ROOTFS_CHECKSUM_FILE="${ROOTFS_ASSET}.sha256"
          elif [ -f "artifacts/checksums.txt" ]; then
            ROOTFS_CHECKSUM_FILE="checksums.txt"
          else
            echo "ERROR: missing checksum asset (${ROOTFS_ASSET}.sha256 or checksums.txt) in ${ROOTFS_REPO}@${ROOTFS_REF}" >&2
            echo "Available assets:" >&2
            printf '%s' "${release_json}" | jq -r '.assets[].name' >&2 || true
            exit 1
          fi
          if [ -f "artifacts/${ROOTFS_SQUASHFS_ASSET}.sha256" ]; then
            (cd artifacts && sha256sum -c "${ROOTFS_SQUASHFS_ASSET}.sha256")
          fi
          echo "ROOTFS_ASSET=${ROOTFS_ASSET}" >> "$GITHUB_ENV"
          echo "ROOTFS_SQUASHFS_ASSET=${ROOTFS_SQUASHFS_ASSET}" >> "$GITHUB_ENV"
          echo "ROOTFS_CHECKSUM_FILE=${ROOTFS_CHECKSUM_FILE}" >> "$GITHUB_ENV"
          ls -lh artifacts
      - name: Extract rootfs checksum
        run: |
          set -euo pipefail
          cd artifacts
          if [ "${ROOTFS_CHECKSUM_FILE}" = "${ROOTFS_ASSET}.sha256" ]; then
            ROOTFS_SHA256="$(awk '{print $1; exit}' "${ROOTFS_CHECKSUM_FILE}" | tr -d '[:space:]')"
          else
            ROOTFS_SHA256="$(awk -v file="${ROOTFS_ASSET}" '$2 == file {print $1; exit}' "${ROOTFS_CHECKSUM_FILE}" | tr -d '[:space:]')"
            if [ -z "${ROOTFS_SHA256}" ]; then
              echo "ERROR: no checksum entry for ${ROOTFS_ASSET} in ${ROOTFS_CHECKSUM_FILE}" >&2
              exit 1
            fi
          fi
          echo "ROOTFS_SHA256=${ROOTFS_SHA256}" >> "$GITHUB_ENV"
          echo "Rootfs checksum: ${ROOTFS_SHA256}"

      - name: Build ISO
        run: |
          set -euo pipefail
          sudo make clean
          sudo ALLOW_NETWORK_FETCH=1 make iso \
            ROOTFS="artifacts/${ROOTFS_ASSET}" \
            ROOTFS_SHA256="${ROOTFS_SHA256}" \
            ROOTFS_SQUASHFS="artifacts/${ROOTFS_SQUASHFS_ASSET}" \
            INSTALLER_UI="deps/dayshield-installer-ui/installer-ui" \
            OUTPUT="${ISO_NAME}"
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Generate ISO checksum
        run: |
          set -euo pipefail
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          cat "${ISO_NAME}.sha256"

      - name: Create or update ISO release
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ISO_NAME}" "${ISO_NAME}.sha256" --clobber
          else
            gh release create "${RELEASE_TAG}" "${ISO_NAME}" "${ISO_NAME}.sha256" --title "ISO ${RELEASE_TAG}" --generate-notes
          fi
