name: ShellCheck

on:
  push:
    paths:
      - 'Makefile'
      - 'scripts/**'
      - 'config/installer/**'
  pull_request:
    paths:
      - 'Makefile'
      - 'scripts/**'
      - 'config/installer/**'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v1
        with:
          files: |
            scripts/*.sh
            config/installer/*.sh
