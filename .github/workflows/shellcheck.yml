name: ShellCheck

on:
  push:
    paths:
      - 'scripts/**'
      - 'config/installer/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'config/installer/**'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          shellcheck --version
          shellcheck -x -e SC1091,SC2329 scripts/*.sh config/installer/*.sh
