name: Build and Release ISO

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build from (for example v1.0.1)
        required: true
        type: string
      core_repo:
        description: Core repository that hosts release artifacts
        required: false
        default: daygle/dayshield-core
        type: string
      installer_ui_ref:
        description: Installer UI ref (tag/branch/SHA). Defaults to release tag.
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [build-iso-from-release]

concurrency:
  group: build-iso-${{ github.event.inputs.tag || github.event.client_payload.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      RELEASE_TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}
      CORE_REPO: ${{ github.event.inputs.core_repo || github.event.client_payload.core_repo || 'daygle/dayshield-core' }}
      INSTALLER_UI_REF_REQUESTED: ${{ github.event.inputs.installer_ui_ref || github.event.client_payload.installer_ui_ref || github.event.inputs.tag || github.event.client_payload.tag }}
      ISO_NAME: dayshield-${{ github.event.inputs.tag || github.event.client_payload.tag }}.iso
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          echo "Building ISO for tag: ${RELEASE_TAG}"
          echo "Using core artifacts from: ${CORE_REPO}"
          if [ -z "${INSTALLER_UI_REF_REQUESTED}" ]; then
            echo "INSTALLER_UI_REF_REQUESTED resolved to empty value"
            exit 1
          fi
          echo "Requested installer UI ref: ${INSTALLER_UI_REF_REQUESTED}"

      - name: Resolve installer UI ref
        id: resolve_installer_ui_ref
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/daygle/dayshield-installer-ui.git"
          CANDIDATE="${INSTALLER_UI_REF_REQUESTED}"

          if git ls-remote --exit-code --heads "${REPO_URL}" "${CANDIDATE}" >/dev/null 2>&1 || \
             git ls-remote --exit-code --tags "${REPO_URL}" "${CANDIDATE}" >/dev/null 2>&1; then
            RESOLVED="${CANDIDATE}"
            echo "Resolved installer UI ref: ${RESOLVED}"
          elif git ls-remote --exit-code --heads "${REPO_URL}" "main" >/dev/null 2>&1; then
            RESOLVED="main"
            echo "WARNING: installer UI ref '${CANDIDATE}' was not found; falling back to '${RESOLVED}'"
          else
            echo "ERROR: installer UI ref '${CANDIDATE}' not found, and fallback branch 'main' does not exist" >&2
            exit 1
          fi

          echo "INSTALLER_UI_REF=${RESOLVED}" >> "$GITHUB_ENV"
          echo "installer_ui_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"

      - name: Checkout ISO repository
        uses: actions/checkout@v5

      - name: Checkout installer UI repository
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-installer-ui
          path: deps/dayshield-installer-ui
          ref: ${{ steps.resolve_installer_ui_ref.outputs.installer_ui_ref }}

      - name: Install ISO build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools grub-pc-bin grub-efi-amd64-bin \
            dosfstools dracut zstd parted rsync util-linux \
            mmdebstrap systemd-container

      - name: Download rootfs artifact and checksums
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ROOTFS_ASSET="rootfs-${RELEASE_TAG}.tar.zst"
          gh release download "${RELEASE_TAG}" \
            --repo "${CORE_REPO}" \
            --pattern "${ROOTFS_ASSET}" \
            --pattern "checksums.txt" \
            --dir artifacts
          if [ ! -f "artifacts/${ROOTFS_ASSET}" ]; then
            echo "ERROR: missing release asset ${ROOTFS_ASSET} in ${CORE_REPO}@${RELEASE_TAG}" >&2
            echo "Available assets:" >&2
            gh release view "${RELEASE_TAG}" --repo "${CORE_REPO}" --json assets --jq '.assets[].name' >&2 || true
            exit 1
          fi
          ls -lh artifacts

      - name: Verify rootfs checksum
        run: |
          set -euo pipefail
          cd artifacts
          ROOTFS_ASSET="rootfs-${RELEASE_TAG}.tar.zst"
          awk -v file="${ROOTFS_ASSET}" '$2 == file {print $1 "  " $2}' checksums.txt > rootfs.sha256
          if [ "$(wc -l < rootfs.sha256)" -ne 1 ]; then
            echo "ERROR: expected exactly one checksum entry for ${ROOTFS_ASSET}" >&2
            echo "Matching entries found:" >&2
            awk -v file="${ROOTFS_ASSET}" '$2 == file {print}' checksums.txt >&2 || true
            exit 1
          fi
          sha256sum -c rootfs.sha256
          ROOTFS_SHA256="$(awk '{print $1}' rootfs.sha256)"
          echo "ROOTFS_SHA256=${ROOTFS_SHA256}" >> "$GITHUB_ENV"
          echo "Verified rootfs checksum: ${ROOTFS_SHA256}"

      - name: Build ISO
        run: |
          set -euo pipefail
          sudo make clean
          sudo ALLOW_NETWORK_FETCH=1 make iso \
            ROOTFS="artifacts/rootfs-${RELEASE_TAG}.tar.zst" \
            ROOTFS_SHA256="${ROOTFS_SHA256}" \
            INSTALLER_UI="deps/dayshield-installer-ui/installer-ui" \
            OUTPUT="${ISO_NAME}"
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Generate ISO checksum
        run: |
          set -euo pipefail
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          cat "${ISO_NAME}.sha256"

      - name: Create or update ISO release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ISO ${{ env.RELEASE_TAG }}
          files: |
            ${{ env.ISO_NAME }}
            ${{ env.ISO_NAME }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
