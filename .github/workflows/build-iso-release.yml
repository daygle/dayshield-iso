name: Build and Release ISO

# This workflow builds and publishes the DayShield installer ISO.
#
# ISO releases are independent of runtime component (core/ui/rootfs) version
# tags.  A new ISO is only needed when you want to update the installable
# medium (e.g. embed a new rootfs baseline or update the installer UI).
# Installed systems receive post-install runtime updates from the manifest
# without requiring a new ISO.
#
# Trigger options
# ---------------
# 1. Tag push/create (automated)
#    Push or create an iso-v* tag (e.g. iso-v1.0.3) or v* tag (e.g. v1.0.3)
#    in this repository.
#    Before pushing the tag, update `release-inputs.env` in this repo to pin
#    the desired rootfs ref (and optionally the installer UI ref).
#
# 2. workflow_dispatch (manual, with overridable inputs)
#    Run from the Actions tab or via the gh CLI:
#      gh workflow run build-iso-release.yml \
#        --field tag=iso-v1.0.3 \
#        --field rootfs_ref=v2.1.0 \
#        --field rootfs_repo=daygle/dayshield-rootfs
#
# 3. repository_dispatch (programmatic)
#    POST to the GitHub API with event type `build-iso-from-release` and
#    client_payload fields: tag, rootfs_ref, rootfs_repo, installer_ui_ref.

on:
  push:
    tags:
      - 'iso-v*'
      - 'v*'
  create:
  workflow_dispatch:
    inputs:
      tag:
        description: |
          ISO release tag (e.g. iso-v1.0.3). This becomes the GitHub Release tag
          for the ISO artifact and is independent of any component version tag.
        required: true
        type: string
      rootfs_repo:
        description: |
          Repository containing the rootfs release artifact
          (default: daygle/dayshield-rootfs). Each component is released
          independently, so the rootfs repo has its own version tags.
        required: false
        default: daygle/dayshield-rootfs
        type: string
      rootfs_ref:
        description: |
          Rootfs release tag to fetch (e.g. v2.1.0). This is the independent
          version tag from the rootfs repo and does not need to match the ISO tag
          or any other component version. Leave empty to auto-resolve latest stable release.
        required: false
        default: ""
        type: string
      installer_ui_ref:
        description: |
          Installer UI ref (tag/branch/SHA).
          Leave empty to auto-resolve latest stable release tag (fallback: main).
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [build-iso-from-release]

concurrency:
  group: build-iso-${{ github.ref_name || github.event.inputs.tag || github.event.client_payload.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release-iso:
    if: >-
      github.event_name != 'create' ||
      (github.event.ref_type == 'tag' &&
      (startsWith(github.event.ref, 'iso-v') || startsWith(github.event.ref, 'v')))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout ISO repository
        uses: actions/checkout@v5

      - name: Resolve build inputs
        # For tag-push builds the rootfs ref and other inputs are read from
        # release-inputs.env (committed to this repo).  workflow_dispatch and
        # repository_dispatch callers supply the inputs directly.
        env:
          GH_TOKEN: ${{ secrets.ROOTFS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: derive the release tag from the git ref.
            RELEASE_TAG="${{ github.ref_name }}"

            # Read optional pinned build inputs from release-inputs.env.
            if [ -f release-inputs.env ]; then
              # shellcheck source=release-inputs.env
              source release-inputs.env
            else
              echo "WARNING: release-inputs.env not found; using automatic defaults."
            fi

            ROOTFS_REPO="${ROOTFS_REPO:-daygle/dayshield-rootfs}"
            INSTALLER_UI_REF_REQUESTED="${INSTALLER_UI_REF:-}"
          elif [ "${{ github.event_name }}" = "create" ]; then
            # Tag create (for tags created in GitHub UI/API): derive tag from create payload.
            RELEASE_TAG="${{ github.event.ref }}"

            # Read optional pinned build inputs from release-inputs.env.
            if [ -f release-inputs.env ]; then
              # shellcheck source=release-inputs.env
              source release-inputs.env
            else
              echo "WARNING: release-inputs.env not found; using automatic defaults."
            fi

            ROOTFS_REPO="${ROOTFS_REPO:-daygle/dayshield-rootfs}"
            INSTALLER_UI_REF_REQUESTED="${INSTALLER_UI_REF:-}"
          else
            # workflow_dispatch or repository_dispatch: use caller-supplied inputs.
            RELEASE_TAG="${{ github.event.inputs.tag || github.event.client_payload.tag }}"
            ROOTFS_REF="${{ github.event.inputs.rootfs_ref || github.event.client_payload.rootfs_ref }}"
            ROOTFS_REPO="${{ github.event.inputs.rootfs_repo || github.event.client_payload.rootfs_repo || 'daygle/dayshield-rootfs' }}"
            INSTALLER_UI_REF_REQUESTED="${{ github.event.inputs.installer_ui_ref || github.event.client_payload.installer_ui_ref || '' }}"
          fi

          # Auto-resolve latest stable rootfs release when no explicit ref is provided.
          if [ -z "${ROOTFS_REF:-}" ]; then
            echo "ROOTFS_REF not provided; resolving latest stable release from ${ROOTFS_REPO}"
            ROOTFS_REF="$(gh release list --repo "${ROOTFS_REPO}" --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')"
            if [ -z "${ROOTFS_REF}" ] || [ "${ROOTFS_REF}" = "null" ]; then
              echo "ERROR: unable to resolve latest stable rootfs release tag from ${ROOTFS_REPO}" >&2
              exit 1
            fi
          fi

          echo "RELEASE_TAG=${RELEASE_TAG}"                               >> "$GITHUB_ENV"
          echo "ROOTFS_REF=${ROOTFS_REF}"                                 >> "$GITHUB_ENV"
          echo "ROOTFS_REPO=${ROOTFS_REPO}"                               >> "$GITHUB_ENV"
          echo "INSTALLER_UI_REF_REQUESTED=${INSTALLER_UI_REF_REQUESTED}" >> "$GITHUB_ENV"
          echo "ISO_NAME=dayshield-${RELEASE_TAG}.iso"                    >> "$GITHUB_ENV"

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          if [ -z "${ROOTFS_REF}" ]; then
            echo "Unable to determine rootfs_ref automatically and none was provided"
            exit 1
          fi
          echo "Building ISO tag:    ${RELEASE_TAG}"
          echo "Rootfs repo:         ${ROOTFS_REPO}"
          echo "Rootfs ref:          ${ROOTFS_REF}"
          echo "Installer UI ref:    ${INSTALLER_UI_REF_REQUESTED:-<auto: latest stable release, fallback main>}"

      - name: Resolve installer UI ref
        id: resolve_installer_ui_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="daygle/dayshield-installer-ui"
          REPO_URL="https://github.com/daygle/dayshield-installer-ui.git"
          CANDIDATE="${INSTALLER_UI_REF_REQUESTED}"

          # If no installer UI ref was requested, auto-resolve latest stable
          # release tag; fallback to main if none is available.
          if [ -z "${CANDIDATE}" ]; then
            RESOLVED="$(gh release list --repo "${REPO}" --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')"
            if [ -n "${RESOLVED}" ] && [ "${RESOLVED}" != "null" ]; then
              echo "Auto-resolved installer UI release tag: ${RESOLVED}"
            else
              RESOLVED="main"
              echo "WARNING: no stable installer UI release found; falling back to '${RESOLVED}'"
            fi
          elif git ls-remote --exit-code --heads "${REPO_URL}" "${CANDIDATE}" >/dev/null 2>&1 || \
               git ls-remote --exit-code --tags "${REPO_URL}" "${CANDIDATE}" >/dev/null 2>&1; then
            RESOLVED="${CANDIDATE}"
            echo "Resolved installer UI ref: ${RESOLVED}"
          elif git ls-remote --exit-code --heads "${REPO_URL}" "main" >/dev/null 2>&1; then
            RESOLVED="main"
            echo "WARNING: installer UI ref '${CANDIDATE}' was not found; falling back to '${RESOLVED}'"
          else
            echo "ERROR: installer UI ref '${CANDIDATE}' not found, and fallback branch 'main' does not exist" >&2
            exit 1
          fi

          echo "INSTALLER_UI_REF=${RESOLVED}" >> "$GITHUB_ENV"
          echo "installer_ui_ref=${RESOLVED}" >> "$GITHUB_OUTPUT"

      - name: Checkout installer UI repository
        uses: actions/checkout@v5
        with:
          repository: daygle/dayshield-installer-ui
          path: deps/dayshield-installer-ui
          ref: ${{ steps.resolve_installer_ui_ref.outputs.installer_ui_ref }}

      - name: Install ISO build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools grub-pc-bin grub-efi-amd64-bin \
            dosfstools dracut zstd parted rsync util-linux \
            mmdebstrap systemd-container

      - name: Download rootfs artifact and checksums
        env:
          GH_TOKEN: ${{ secrets.ROOTFS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Rootfs is versioned independently in its own repo.
          # ROOTFS_REF is the rootfs-specific tag (e.g. v2.1.0), which is
          # independent of the ISO tag or any other component version.
          ROOTFS_ASSET="rootfs-${ROOTFS_REF}.tar.zst"
          gh release download "${ROOTFS_REF}" \
            --repo "${ROOTFS_REPO}" \
            --pattern "${ROOTFS_ASSET}" \
            --pattern "checksums.txt" \
            --dir artifacts
          if [ ! -f "artifacts/${ROOTFS_ASSET}" ]; then
            echo "ERROR: missing release asset ${ROOTFS_ASSET} in ${ROOTFS_REPO}@${ROOTFS_REF}" >&2
            echo "Available assets:" >&2
            gh release view "${ROOTFS_REF}" --repo "${ROOTFS_REPO}" --json assets --jq '.assets[].name' >&2 || true
            exit 1
          fi
          echo "ROOTFS_ASSET=${ROOTFS_ASSET}" >> "$GITHUB_ENV"
          ls -lh artifacts

      - name: Verify rootfs checksum
        run: |
          set -euo pipefail
          cd artifacts
          awk -v file="${ROOTFS_ASSET}" '$2 == file {print $1 "  " $2}' checksums.txt > rootfs.sha256
          if [ "$(wc -l < rootfs.sha256)" -ne 1 ]; then
            echo "ERROR: expected exactly one checksum entry for ${ROOTFS_ASSET}" >&2
            echo "Matching entries found:" >&2
            awk -v file="${ROOTFS_ASSET}" '$2 == file {print}' checksums.txt >&2 || true
            exit 1
          fi
          sha256sum -c rootfs.sha256
          ROOTFS_SHA256="$(awk '{print $1}' rootfs.sha256)"
          echo "ROOTFS_SHA256=${ROOTFS_SHA256}" >> "$GITHUB_ENV"
          echo "Verified rootfs checksum: ${ROOTFS_SHA256}"

      - name: Build ISO
        run: |
          set -euo pipefail
          sudo make clean
          sudo ALLOW_NETWORK_FETCH=1 make iso \
            ROOTFS="artifacts/${ROOTFS_ASSET}" \
            ROOTFS_SHA256="${ROOTFS_SHA256}" \
            INSTALLER_UI="deps/dayshield-installer-ui/installer-ui" \
            OUTPUT="${ISO_NAME}"
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Generate ISO checksum
        run: |
          set -euo pipefail
          sha256sum "${ISO_NAME}" > "${ISO_NAME}.sha256"
          cat "${ISO_NAME}.sha256"

      - name: Create or update ISO release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ISO ${{ env.RELEASE_TAG }}
          files: |
            ${{ env.ISO_NAME }}
            ${{ env.ISO_NAME }}.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
